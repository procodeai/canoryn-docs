<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Space Gradient -->
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07080e;stop-opacity:1" />
    </linearGradient>

    <!-- Front Face Gradient: Yellow-to-Orange-to-Red -->
    <linearGradient id="frontFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>

    <!-- Top Face Gradient: Yellow-to-Orange-to-Salmon -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>

    <!-- Right Face Gradient: Salmon-to-Pink -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#f43f8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Core Orb Glow -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0" />
    </radialGradient>

    <!-- Glowing Node Filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle Background Container -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#spaceBg)" />

  <!-- Stars & Space Streaks -->
  <circle cx="150" cy="590" r="3" fill="white" opacity="0.6" />
  <circle cx="650" cy="110" r="4" fill="white" opacity="0.5" />
  <circle cx="925" cy="325" r="3" fill="white" opacity="0.7" />
  <circle cx="445" cy="880" r="4" fill="white" opacity="0.4" />
  <circle cx="830" cy="830" r="3" fill="white" opacity="0.5" />

  <!-- Shooting Star 1 -->
  <path d="M 210 270 L 310 170" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  <path d="M 210 270 L 260 220" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8" />

  <!-- Shooting Star 2 -->
  <path d="M 710 120 L 770 60" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <path d="M 710 120 L 740 90" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />

  <!-- The 3D Hollow Cube -->
  <!-- 1. Top Face -->
  <polygon points="140,350 440,150 860,150 640,350" fill="url(#topFace)" opacity="0.96" />

  <!-- 2. Right Face -->
  <polygon points="640,350 860,150 860,650 640,850" fill="url(#rightFace)" />

  <!-- 3. Back void, aligned exactly to the front face cut-out -->
  <rect x="330" y="350" width="310" height="315" fill="#07080e" />

  <!-- 4. Floating glowing orb centered inside the cut-out -->
  <circle cx="485" cy="508" r="86" fill="url(#orbGlow)" filter="url(#softGlow)" />
  <circle cx="485" cy="508" r="35" fill="#f59e0b" filter="url(#softGlow)" />
  <circle cx="485" cy="508" r="15" fill="#fde047" />

  <!-- 5. Front face with a cut-out that reveals the back void -->
  <path d="M 140 350 L 140 850 L 640 850 L 640 350 Z M 330 350 L 330 665 L 640 665 L 640 350 Z"
        fill="url(#frontFace)" fill-rule="evenodd" />

</svg>
